apiVersion: v1
kind: ServiceAccount
metadata:
  name: codebuddy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codebuddy
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codebuddy
subjects:
- kind: ServiceAccount
  name: codebuddy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codebuddy
