apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codebuddy
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: codebuddy.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: codebuddy
            port:
              number: 80
