apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebuddy
  labels:
    app: codebuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codebuddy
  template:
    metadata:
      labels:
        app: codebuddy
    spec:
      serviceAccountName: codebuddy
      containers:
      - name: codebuddy
        image: codebuddy:latest
        ports:
        - containerPort: 3000
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: production
        - name: GROK_API_KEY
          valueFrom:
            secretKeyRef:
              name: codebuddy-secrets
              key: grok-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: codebuddy-secrets
              key: jwt-secret
        - name: GROK_MODEL
          valueFrom:
            configMapKeyRef:
              name: codebuddy-config
              key: GROK_MODEL
        - name: MAX_COST
          valueFrom:
            configMapKeyRef:
              name: codebuddy-config
              key: MAX_COST
        - name: RATE_LIMIT_MAX
          valueFrom:
            configMapKeyRef:
              name: codebuddy-config
              key: RATE_LIMIT_MAX
        livenessProbe:
          httpGet:
            path: /livez
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
