name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build native modules for tests
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Test with Coverage
        run: npm run test:coverage

  build-macos:
    name: Release macOS
    needs: [lint-and-test]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-mac-

      - name: Install dependencies
        run: npm ci

      - name: Install cliclick for GUI tools
        run: brew install cliclick

      - name: Download Node binaries
        run: node scripts/download-node.js

      - name: Prepare Python runtime
        run: node scripts/prepare-python.js

      - name: Prepare GUI tools
        run: node scripts/prepare-gui-tools.js

      - name: Build Lima agent
        run: npm run build:lima-agent

      - name: Build MCP servers
        run: npm run build:mcp

      - name: TypeScript compile
        run: npx tsc

      - name: Vite build
        run: npx vite build

      - name: Electron Builder (unsigned)
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            release/*.dmg
            release/*.zip
          draft: true

  build-windows:
    name: Release Windows
    needs: [lint-and-test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-win-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-win-

      - name: Install dependencies
        run: npm ci

      - name: Download Node binaries
        run: node scripts/download-node.js

      - name: Build WSL agent
        run: npm run build:wsl-agent

      - name: Build MCP servers
        run: npm run build:mcp

      - name: TypeScript compile
        run: npx tsc

      - name: Vite build
        run: npx vite build

      - name: Electron Builder
        run: npx electron-builder --win nsis --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            release/*.exe
          draft: true
