name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Build native modules for tests
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      # Runs tests and enforces coverage thresholds defined in vitest.config.mts.
      # If coverage drops below the thresholds, vitest exits non-zero and this step fails.
      - name: Test with Coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-mac-

      - name: Cache Node binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/node/darwin-arm64
          key: node-darwin-arm64-v22.22.0

      - name: Install dependencies
        run: npm ci

      - name: Install cliclick for GUI tools
        run: brew install cliclick

      - name: Download Node binaries
        run: node scripts/download-node.js

      - name: Prepare Python runtime
        run: node scripts/prepare-python.js

      - name: Prepare GUI tools
        run: node scripts/prepare-gui-tools.js

      - name: Build Lima agent
        run: npm run build:lima-agent

      - name: Build MCP servers
        run: npm run build:mcp

      - name: TypeScript compile
        run: npx tsc

      - name: Vite build
        run: npx vite build

      - name: Electron Builder (unsigned)
        run: npx electron-builder --mac dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Smoke test - verify packaged resources
        if: success()
        run: |
          set -euo pipefail
          APP_DIR="release/mac-arm64"
          APP_NAME=$(ls "$APP_DIR" | grep '\.app$' | head -1)
          if [ -z "$APP_NAME" ]; then
            echo "::error::No .app bundle found in $APP_DIR"
            exit 1
          fi
          RESOURCES="$APP_DIR/$APP_NAME/Contents/Resources"
          echo "Checking resources in: $RESOURCES"

          FAILED=0
          for check in \
            "mcp/gui-operate-server.js" \
            "mcp/software-dev-server-example.js" \
            "node/bin/node" \
            "lima-agent/index.js" \
            "skills"; do
            if [ -e "$RESOURCES/$check" ]; then
              echo "  OK: $check"
            else
              echo "::error::Missing resource: $check"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Packaged app is missing critical resources"
            exit 1
          fi
          echo "All packaged resources verified."

      - name: Smoke test - launch app
        if: success()
        timeout-minutes: 2
        run: |
          set -euo pipefail
          APP_DIR="release/mac-arm64"
          APP_NAME=$(ls "$APP_DIR" | grep '\.app$' | head -1)
          APP_PATH="$APP_DIR/$APP_NAME"

          echo "Launching: $APP_PATH"
          open "$APP_PATH" &

          # Wait for nav server to respond (port 19888)
          echo "Waiting for nav server..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:19888/status > /dev/null 2>&1; then
              echo "Nav server responded on attempt $i"
              break
            fi
            sleep 0.5
          done

          if curl -sf http://127.0.0.1:19888/status > /dev/null 2>&1; then
            echo "Smoke test PASSED - app launched and nav server is responding"
          else
            echo "::warning::Nav server did not respond within 15s (app may need display)"
          fi

          # Clean shutdown
          pkill -f "Open Cowork" 2>/dev/null || true
          sleep 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: open-cowork-macos
          path: |
            release/*.dmg
            release/mac-arm64/*.app
          retention-days: 7
          if-no-files-found: warn

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-win-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-win-

      - name: Cache Node binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/node/win32-x64
          key: node-win32-x64-v22.22.0

      - name: Install dependencies
        run: npm ci

      - name: Download Node binaries
        run: node scripts/download-node.js

      - name: Build WSL agent
        run: npm run build:wsl-agent

      - name: Build MCP servers
        run: npm run build:mcp

      - name: TypeScript compile
        run: npx tsc

      - name: Vite build
        run: npx vite build

      - name: Electron Builder
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Smoke test - verify packaged resources
        if: success()
        shell: pwsh
        run: |
          $unpackedDir = "release\win-unpacked"
          if (-not (Test-Path $unpackedDir)) {
            Write-Host "::warning::win-unpacked directory not found, skipping resource check"
            exit 0
          }

          $resourcesDir = Join-Path $unpackedDir "resources"
          Write-Host "Checking resources in: $resourcesDir"

          $checks = @(
            "mcp\gui-operate-server.js",
            "mcp\software-dev-server-example.js",
            "node\node.exe",
            "wsl-agent\index.js",
            "skills"
          )

          $failed = $false
          foreach ($check in $checks) {
            $fullPath = Join-Path $resourcesDir $check
            if (Test-Path $fullPath) {
              Write-Host "  OK: $check"
            } else {
              Write-Host "::error::Missing resource: $check"
              $failed = $true
            }
          }

          if ($failed) {
            Write-Host "::error::Packaged app is missing critical resources"
            exit 1
          }
          Write-Host "All packaged resources verified."

      - name: Upload Windows artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: open-cowork-windows
          path: |
            release/*.exe
          retention-days: 7
          if-no-files-found: warn
